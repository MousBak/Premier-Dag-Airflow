name: weather_data_platform
version: "1.0.0"
config-version: 2

profile: weather_data_platform

model-paths:  ["models"]
test-paths:   ["tests"]
macro-paths:  ["macros"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  weather_data_platform:
    staging:
      +materialized: view      # staging = lightweight views, no storage cost
      +schema: staging
    marts:
      +materialized: table     # marts = physical tables, optimized for queries
      +schema: marts
